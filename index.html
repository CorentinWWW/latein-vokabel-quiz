<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latein Vokabel-Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #1e3c72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Start Screen */
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .quiz-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-align: left;
        }

        .quiz-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .quiz-btn:active {
            transform: translateY(-1px);
        }

        .quiz-btn.special {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .quiz-btn.special:hover {
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        /* Quiz Screen */
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 0.95em;
            font-weight: 600;
        }

        .card-container {
            perspective: 1000px;
            margin: 40px 0;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            font-size: 1.8em;
            font-weight: 600;
            text-align: center;
            padding: 30px;
            line-height: 1.4;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card-hint {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-correct:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.4);
        }

        .btn-retry {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            color: white;
        }

        .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(238, 9, 121, 0.4);
        }

        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        /* Results Screen */
        .results-container {
            text-align: center;
        }

        .results-score {
            font-size: 3.5em;
            color: #667eea;
            margin: 30px 0;
            font-weight: 700;
        }

        .results-message {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .results-stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .results-stat {
            margin: 10px 0;
            color: #666;
        }

        .results-stat strong {
            color: #1e3c72;
        }

        .btn-group-results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-again {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            color: white;
        }

        .btn-again:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(238, 9, 121, 0.4);
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .card-face {
                font-size: 1.4em;
                padding: 20px;
            }

            .card-container {
                height: 250px;
            }

            .btn {
                font-size: 1em;
                padding: 12px 15px;
            }

            .results-score {
                font-size: 2.5em;
            }

            .results-message {
                font-size: 1.2em;
            }
        }

        .flip-hint {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 15px;
        }
    </style>
</head>

                <button class="quiz-btn special" onclick="startQuiz('important', null)">Wichtigste Vokabeln für die Schularbeit</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="progress-text"><span id="progressText">1/10</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="card-container" onclick="flipCard()">
                <div class="card" id="card">
                    <div class="card-face card-front">
                        <div>
                            <div id="cardFront">Latein</div>
                            <div class="card-hint">Klick zum Umdrehen</div>
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <div id="cardBack">Deutsch</div>
                    </div>
                </div>
            </div>

            <div class="flip-hint">Klick auf die Karte zum Umdrehen</div>

            <div class="button-group">
                <button class="btn btn-correct" onclick="markCorrect()">✓ Gewusst</button>
                <button class="btn btn-retry" onclick="markRetry()">✗ Nochmal</button>
            </div>

            <button class="btn btn-back" onclick="backToStart()">← Zurück zur Auswahl</button>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div class="results-container">
                <h2 style="color: #1e3c72; margin-bottom: 20px;">Quiz abgeschlossen!</h2>
                <div class="results-score" id="scoreDisplay">0%</div>
                <div class="results-message" id="resultMessage">Gut gemacht!</div>

                <div class="results-stats">
                    <div class="results-stat">Richtig beantwortet: <strong id="correctCount">0</strong></div>
                    <div class="results-stat">Wiederholen nötig: <strong id="retryCount">0</strong></div>
                    <div class="results-stat">Gesamt: <strong id="totalCount">0</strong></div>
                </div>

                <div id="retrySection" style="display: none; margin-top: 30px;">
                    <p style="color: #666; margin-bottom: 15px;">Du hast Vokabeln zum Wiederholen. Möchtest du diese nochmal üben?</p>
                    <button class="btn btn-again" onclick="retryMissed()">Wiederholen</button>
                </div>

                <div class="btn-group-results" style="margin-top: 20px;">
                    <button class="btn btn-home" onclick="backToStart()">← Zurück zur Auswahl</button>
                </div>
            </div>
        </div>
    </div>

        // Global state
        let currentQuiz = [];
        let currentIndex = 0;
        let correctCount = 0;
        let retryCount = 0;
        let missedCards = [];
        let isFlipped = false;

        function startQuiz(type, value) {
            currentQuiz = [];
            currentIndex = 0;
            correctCount = 0;
            retryCount = 0;
            missedCards = [];
            isFlipped = false;

            if (type === 'lesson') {
                currentQuiz = lessonsData[value] || [];
            } else if (type === 'range') {
                const [start, end] = value.split('-').map(Number);
                for (let i = start; i <= end; i++) {
                    if (lessonsData[i]) {
                        currentQuiz = currentQuiz.concat(lessonsData[i]);
                    }
                }
            } else if (type === 'all') {
                for (let i = 1; i <= 27; i++) {
                    if (lessonsData[i]) {
                        currentQuiz = currentQuiz.concat(lessonsData[i]);
                    }
                }
            } else if (type === 'important') {
                currentQuiz = importantVocab;
            }

            // Shuffle the quiz
            currentQuiz = currentQuiz.sort(() => Math.random() - 0.5);

            showScreen('quizScreen');
            displayCard();
        }

        function displayCard() {
            if (currentIndex >= currentQuiz.length) {
                showResults();
                return;
            }

            const card = currentQuiz[currentIndex];
            document.getElementById('cardFront').textContent = card.latin;
            document.getElementById('cardBack').textContent = card.german;
            document.getElementById('card').classList.remove('flipped');
            isFlipped = false;

            const progress = currentIndex + 1;
            const total = currentQuiz.length;
            document.getElementById('progressText').textContent = `${progress}/${total}`;
            document.getElementById('progressFill').style.width = `${(progress / total) * 100}%`;
        }

        function flipCard() {
            const card = document.getElementById('card');
            card.classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        function markCorrect() {
            correctCount++;
            currentIndex++;
            displayCard();
        }

        function markRetry() {
            retryCount++;
            missedCards.push(currentQuiz[currentIndex]);
            currentIndex++;
            displayCard();
        }

        function showResults() {
            const total = correctCount + retryCount;
            const percentage = total > 0 ? Math.round((correctCount / total) * 100) : 0;

            document.getElementById('scoreDisplay').textContent = `${percentage}%`;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('retryCount').textContent = retryCount;
            document.getElementById('totalCount').textContent = total;

            if (percentage === 100) {
                document.getElementById('resultMessage').textContent = 'Perfekt! 🎉';
            } else if (percentage >= 80) {
                document.getElementById('resultMessage').textContent = 'Sehr gut! 👏';
            } else if (percentage >= 60) {
                document.getElementById('resultMessage').textContent = 'Gut gemacht! 😊';
            } else {
                document.getElementById('resultMessage').textContent = 'Weiter üben! 💪';
            }

            if (missedCards.length > 0) {
                document.getElementById('retrySection').style.display = 'block';
            } else {
                document.getElementById('retrySection').style.display = 'none';
            }

            showScreen('resultsScreen');
        }

        function retryMissed() {
            currentQuiz = missedCards;
            currentIndex = 0;
            correctCount = 0;
            retryCount = 0;
            missedCards = [];
            isFlipped = false;

            showScreen('quizScreen');
            displayCard();
        }

        function backToStart() {
            showScreen('startScreen');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }
